<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PartForge — Gear & Gearbox Generator</title>
<style>
  :root{
    color-scheme: light;
    --parchment:#ede0d4; --panel:#e7d6c5; --panel2:#f3e9dd;
    --line:#cdb89f; --ink:#3a2c22; --ink-soft:#6b5645;
    --clay:#9c6644; --clay-d:#7f5539; --olive:#606c38; --olive-d:#3f4a25;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:14px/1.5 "Iowan Old Style","Palatino Linotype",Georgia,serif;color:var(--ink);
    background:var(--parchment);display:flex;min-height:100vh}
  .sidebar{width:344px;min-width:344px;padding:18px 18px 28px;overflow-y:auto;
    background:linear-gradient(180deg,#efe4d8,#e3d0bd);border-right:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:8px}
  .brand h1{font-size:23px;margin:0;letter-spacing:.5px;color:var(--clay-d)}
  .brand span{font-size:11px;color:var(--ink-soft);letter-spacing:2px;text-transform:uppercase}
  .byline{font-size:12px;color:var(--ink-soft);margin:3px 0 0}
  .byline a{color:var(--clay-d);text-decoration:none;border-bottom:1px solid var(--line)}
  .byline a:hover{color:var(--clay);border-color:var(--clay)}
  .tag{font-size:12px;color:var(--ink-soft);margin:4px 0 14px}
  .tabs{display:flex;gap:5px;margin-bottom:14px}
  .tab{flex:1;padding:8px 4px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);
    color:var(--ink-soft);font-weight:600;font-size:12px;text-align:center;cursor:pointer;line-height:1.2}
  .tab.active{background:var(--clay-d);color:#f6ecdf;border-color:var(--clay-d)}
  button{font:inherit;cursor:pointer}
  .label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--olive-d);margin:16px 0 8px;font-weight:700}
  .types{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .types.two{grid-template-columns:1fr 1fr}
  .type{padding:9px 4px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);
    color:var(--ink-soft);font-size:11.5px;text-align:center;line-height:1.2}
  .type b{display:block;font-size:17px;margin-bottom:2px}
  .type.active{background:var(--olive);color:#f4efe2;border-color:var(--olive-d)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0}
  .row label{font-size:12.5px;color:var(--ink-soft)}
  .row input[type=number]{width:88px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;
    background:var(--panel2);color:var(--ink);font:inherit;font-size:13px;text-align:right}
  .row input:focus{outline:none;border-color:var(--clay)}
  .info{margin-top:12px;padding:11px 12px;border-radius:9px;background:rgba(96,108,56,.10);
    border:1px solid rgba(96,108,56,.30);font-size:12px;color:var(--olive-d)}
  .info b{color:var(--ink)} .info .big{font-size:15px;color:var(--clay-d)}
  .specs{display:grid;grid-template-columns:1fr auto;gap:3px 12px;margin-top:8px;font-size:12px}
  .specs .k{color:var(--ink-soft)} .specs .v{color:var(--ink);font-weight:600;text-align:right}
  .specs .hd{grid-column:1/3;color:var(--clay-d);font-weight:700;margin-top:5px;border-top:1px solid var(--line);padding-top:5px}
  .specs .hd:first-child{border-top:none;margin-top:0;padding-top:0}
  .fmt{width:100%;padding:8px 9px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);
    color:var(--ink);font:inherit;font-size:12.5px;margin-top:12px}
  .seg{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
  .seg button{flex:1;min-width:60px;padding:7px 4px;border:1px solid var(--line);border-radius:8px;
    background:var(--panel2);color:var(--ink-soft);font-size:12px}
  .seg button.active{background:var(--olive);color:#f4efe2;border-color:var(--olive-d)}
  .dlrow{display:flex;gap:8px;margin-top:10px}
  .dl{flex:1;padding:10px 8px;border:none;border-radius:9px;font-weight:600;font-size:12.5px;text-align:center}
  .dl-stl{background:var(--clay-d);color:#f6ecdf} .dl-stl:hover{background:var(--clay)}
  .dl-print{background:var(--olive);color:#f4efe2} .dl-print:hover{background:var(--olive-d)}
  .tolbox{margin-top:10px;padding:10px 12px;border:1px dashed var(--line);border-radius:9px;background:rgba(156,102,68,.06)}
  .tolbox .label{margin:0 0 6px}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--ink-soft);border-radius:8px;padding:8px 10px;font-size:12px}
  .ghost:hover{border-color:var(--clay);color:var(--clay-d)}
  .viewbtns{display:flex;gap:8px;margin-top:12px}
  .credit{margin-top:18px;font-size:10.5px;color:var(--ink-soft);opacity:.85;line-height:1.5}
  .stage{flex:1;position:relative;min-width:0}
  canvas{display:block;width:100%;height:100%;cursor:grab}
  canvas:active{cursor:grabbing}
  .hint{position:absolute;left:16px;bottom:14px;font-size:11px;color:var(--ink-soft);opacity:.8;pointer-events:none}
  @media (max-width:760px){body{flex-direction:column}.sidebar{width:100%;min-width:0}.stage{height:52vh}}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><h1>PartForge</h1><span>gear bench</span></div>
    <div class="byline">Designed by <a href="https://www.linkedin.com/in/ishaanbhutda/" target="_blank" rel="noopener">Ishaan Bhutda</a></div>

    <div class="tabs">
      <div class="tab active" data-mode="gear">Single Gear</div>
      <div class="tab" data-mode="planetary">Planetary</div>
      <div class="tab" data-mode="cycloidal">Cycloidal</div>
    </div>

    <div id="panel"></div>

    <div class="tolbox">
      <div class="label">3D-print clearances (mm)</div>
      <div class="row"><label>Bore clearance (+Ø)</label><input type="number" id="tolBore" step="0.05" value="0.40"></div>
      <div class="row"><label>Tooth / OD clearance</label><input type="number" id="tolDia" step="0.05" value="0.30"></div>
    </div>

    <select class="fmt" id="fmt">
      <option value="step">Format — STEP (solid, for CAD)</option>
      <option value="stl">Format — STL (mesh, for slicers)</option>
    </select>
    <div class="dlrow">
      <button class="dl dl-stl" id="dlStl">Download</button>
      <button class="dl dl-print" id="dlPrint">3D-print (+clearance)</button>
    </div>
    <div class="viewbtns">
      <button class="ghost" id="spin" style="flex:1">Spin</button>
      <button class="ghost" id="reset" style="flex:1">Reset view</button>
    </div>
  </aside>

  <main class="stage">
    <canvas id="cv"></canvas>
    <div class="hint">drag to orbit · scroll to zoom</div>
  </main>

<!-- ===== geometry engine (tested) ===== -->
<script>
// ============================================================
//  PartForge geometry engine v2 — gears + planetary gearbox.
//  Mesh = { verts:[[x,y,z]], faces:[[i,j,k]] }
// ============================================================
(function (root) {
  const TAU = Math.PI * 2;
  const M = () => ({ verts: [], faces: [] });
  const V = (m, x, y, z) => (m.verts.push([x, y, z]), m.verts.length - 1);
  const Q = (m, a, b, c, d) => { m.faces.push([a, b, c]); m.faces.push([a, c, d]); };
  const T = (m, a, b, c) => m.faces.push([a, b, c]);

  function merge() {
    const o = M();
    for (const m of arguments) {
      const off = o.verts.length;
      for (const v of m.verts) o.verts.push(v.slice());
      for (const f of m.faces) o.faces.push([f[0] + off, f[1] + off, f[2] + off]);
    }
    return o;
  }
  function translate(m, dx, dy, dz) { for (const v of m.verts) { v[0] += dx; v[1] += dy; v[2] += dz; } return m; }
  function rotZ(m, a) { const c = Math.cos(a), s = Math.sin(a); for (const v of m.verts) { const x = v[0], y = v[1]; v[0] = x * c - y * s; v[1] = x * s + y * c; } return m; }
  function clone(m) { return { verts: m.verts.map(v => v.slice()), faces: m.faces.map(f => f.slice()) }; }

  // ---- external involute gear cross-section (clearance-aware) ----
  function gearProfile(p) {
    const m = p.module, z = p.teeth;
    const alpha = (p.pressureAngle || 20) * Math.PI / 180;
    const aCo = p.addendum ?? 1.0, dCo = p.dedendum ?? 1.25;
    const N = Math.max(4, p.ptsPerFlank || 10);
    const dia = p.diaClearance || 0;                 // shrink OD + thin teeth
    const rp = m * z / 2, rb = rp * Math.cos(alpha);
    const ra = rp + aCo * m - dia / 2, rf = rp - dCo * m;
    const invA = Math.tan(alpha) - alpha;
    const thin = dia / (2 * rp);
    const beta0 = Math.PI / (2 * z) + invA - thin;
    const theta = (r) => { const rr = Math.max(r, rb); const ar = Math.acos(Math.min(1, rb / rr)); return beta0 - (Math.tan(ar) - ar); };
    const rlo = Math.max(rf, rb), radii = [];
    if (rf < rb) radii.push(rf);
    for (let k = 0; k < N; k++) radii.push(rlo + (ra - rlo) * k / (N - 1));
    const pts = [], step = TAU / z, tTip = theta(ra), tRoot = theta(rf);
    for (let i = 0; i < z; i++) {
      const phi = i * step;
      for (const r of radii) { const a = phi - theta(r); pts.push([r * Math.cos(a), r * Math.sin(a)]); }
      for (let t = 1; t <= 4; t++) { const a = (phi - tTip) + 2 * tTip * t / 4; pts.push([ra * Math.cos(a), ra * Math.sin(a)]); }
      for (let k = radii.length - 1; k >= 0; k--) { const r = radii[k], a = phi + theta(r); pts.push([r * Math.cos(a), r * Math.sin(a)]); }
      const a0 = phi + tRoot, a1 = phi + step - tRoot;
      for (let t = 1; t <= 3; t++) { const a = a0 + (a1 - a0) * t / 4; pts.push([rf * Math.cos(a), rf * Math.sin(a)]); }
    }
    return { pts, rp, ra, rf, rb };
  }

  // ---- internal (ring) gear inner boundary, via pitch-circle reflection ----
  function ringInner(p) {
    const base = gearProfile({ module: p.module, teeth: p.teeth, pressureAngle: p.pressureAngle, ptsPerFlank: p.ptsPerFlank });
    const rp = base.rp, m = p.module, dCo = p.dedendum ?? 1.25, aCo = p.addendum ?? 1.0;
    const dia = p.diaClearance || 0;
    const inner = base.pts.map(([x, y]) => {
      const r = Math.hypot(x, y), a = Math.atan2(y, x);
      const r2 = (2 * rp - r) + dia / 2;            // reflect inside + clearance outward
      return [r2 * Math.cos(a), r2 * Math.sin(a)];
    });
    const tip = rp - aCo * m, root = rp + dCo * m;
    return { inner, rp, tip, root };
  }

  // ---- extrude between an outer loop and an optional inner loop ----
  function extrudeBetween(outer2d, inner2d, opts) {
    const face = opts.face, L = Math.max(1, opts.layers || 1), tw = opts.twistFn || (() => 0);
    const n = outer2d.length, m = M(), O = [], I = [];
    const hasInner = !!inner2d;
    for (let li = 0; li <= L; li++) {
      const t = li / L, zc = face * t, rot = tw(t), c = Math.cos(rot), s = Math.sin(rot);
      const oR = [], iR = [];
      for (let i = 0; i < n; i++) {
        const x = outer2d[i][0], y = outer2d[i][1];
        oR.push(V(m, x * c - y * s, x * s + y * c, zc));
        if (hasInner) { const xi = inner2d[i][0], yi = inner2d[i][1]; iR.push(V(m, xi * c - yi * s, xi * s + yi * c, zc)); }
      }
      O.push(oR); I.push(iR);
    }
    for (let li = 0; li < L; li++) for (let i = 0; i < n; i++) { const j = (i + 1) % n; Q(m, O[li][i], O[li][j], O[li + 1][j], O[li + 1][i]); }
    if (hasInner) {
      for (let li = 0; li < L; li++) for (let i = 0; i < n; i++) { const j = (i + 1) % n; Q(m, I[li][i], I[li + 1][i], I[li + 1][j], I[li][j]); }
      for (let i = 0; i < n; i++) { const j = (i + 1) % n; Q(m, O[0][j], O[0][i], I[0][i], I[0][j]); Q(m, O[L][i], O[L][j], I[L][j], I[L][i]); }
    } else {
      const cB = V(m, 0, 0, 0), cT = V(m, 0, 0, face);
      for (let i = 0; i < n; i++) { const j = (i + 1) % n; T(m, cB, O[0][j], O[0][i]); T(m, cT, O[L][i], O[L][j]); }
    }
    return m;
  }

  function twistFor(kind, helixDeg, face, rp) {
    const helix = (helixDeg || 0) * Math.PI / 180;
    const total = Math.tan(helix) * face / rp;
    if (kind === 'helical') return { layers: Math.max(2, Math.ceil(Math.abs(total) / 0.18)), fn: (t) => total * t };
    if (kind === 'herringbone') return { layers: Math.max(4, 2 * Math.ceil(Math.abs(total) / 0.18)), fn: (t) => total * (t < 0.5 ? t : 1 - t) };
    return { layers: 1, fn: () => 0 };
  }

  function buildGear(p) {
    const prof = gearProfile(p);
    const tw = twistFor(p.kind || 'spur', p.helixAngle, p.face, prof.rp);
    const holes = [];
    const bore = (p.bore || 0) + (p.bore > 0 ? (p.boreClearance || 0) : 0);
    if (bore > 0) holes.push(circlePts(bore / 2, 64));
    const mesh = extrudeMulti(prof.pts, holes, { face: p.face, layers: tw.layers, twistFn: tw.fn });
    mesh.info = { type: (p.kind || 'spur') + ' gear', teeth: p.teeth, module: p.module,
      pitchDia: +(p.module * p.teeth).toFixed(2), outerDia: +(2 * prof.ra).toFixed(2), bore: +bore.toFixed(2) };
    return mesh;
  }

  function buildRing(p) {
    const ri = ringInner(p);
    const rim = ri.root + (p.rim || 2 * p.module);          // outer rim radius
    const tw = twistFor(p.kind || 'spur', p.helixAngle, p.face, ri.rp);
    const outer = circlePts(rim, Math.max(72, ri.inner.length));
    const mesh = extrudeMulti(outer, [ri.inner], { face: p.face, layers: tw.layers, twistFn: tw.fn });
    mesh.info = { type: (p.kind || 'spur') + ' ring gear', teeth: p.teeth, module: p.module,
      pitchDia: +(p.module * p.teeth).toFixed(2), rimDia: +(2 * rim).toFixed(2) };
    return mesh;
  }

  // ---- planetary ratio solver (ring fixed, sun in, carrier out: i = 1 + R/S) ----
  function solvePlanetary(target, N, opts) {
    opts = opts || {};
    const sMin = opts.sMin || 9, sMax = opts.sMax || 60, pMin = opts.pMin || 8, pMax = opts.pMax || 120;
    let best = null;
    for (let S = sMin; S <= sMax; S++) {
      for (let P = pMin; P <= pMax; P++) {
        const R = S + 2 * P;
        if ((S + R) % N !== 0) continue;                       // equal-spacing condition
        const neighbor = (S + P) * Math.sin(Math.PI / N) > (P + 2.2); // no planet collision
        if (!neighbor) continue;
        const ratio = 1 + R / S;
        const err = Math.abs(ratio - target);
        const score = err * 1000 + (S + P) * 0.01;             // prefer accuracy, then compactness
        if (!best || score < best.score) best = { S, P, R, N, ratio: +ratio.toFixed(4), err: +err.toFixed(4), score };
      }
    }
    return best;
  }

  // Self-optimizing: search planet count AND tooth counts to best match the target
  // ratio. Among equally-accurate options it prefers more planets (load sharing),
  // then a compact size. Returns the achieved design (single stage).
  function solvePlanetaryAuto(target, opts) {
    opts = opts || {};
    const sMin = opts.sMin || 9, sMax = opts.sMax || 60, pMin = opts.pMin || 8, pMax = opts.pMax || 120;
    const nMin = opts.nMin || 3, nMax = opts.nMax || 6;
    let best = null;
    for (let N = nMin; N <= nMax; N++) {
      for (let S = sMin; S <= sMax; S++) {
        for (let P = pMin; P <= pMax; P++) {
          const R = S + 2 * P;
          if ((S + R) % N !== 0) continue;
          if (!((S + P) * Math.sin(Math.PI / N) > (P + 2.2))) continue;
          const ratio = 1 + R / S, err = Math.abs(ratio - target);
          const score = err * 1000 - N * 0.4 + (S + P) * 0.003;   // accuracy, then more planets, then compact
          if (!best || score < best.score) best = { S, P, R, N, ratio: +ratio.toFixed(4), err: +err.toFixed(4), score };
        }
      }
    }
    return best;
  }

  function buildPlanetary(p) {
    const sol = p.solution;                                    // {S,P,R,N}
    const m = p.module, kind = p.kind || 'spur';
    // Helical hands: external-external mesh (sun↔planet) needs OPPOSITE hands;
    // external-internal mesh (planet↔ring) needs the SAME hand. So with planets at
    // hand +h, the sun is -h and the ring is +h. Same helix magnitude throughout.
    const h = p.helixAngle || 0;
    const base = { module: m, pressureAngle: p.pressureAngle || 20, face: p.face, kind,
      ptsPerFlank: p.ptsPerFlank, diaClearance: p.diaClearance || 0 };
    const sun = buildGear(Object.assign({ teeth: sol.S, bore: p.sunBore || 0, boreClearance: p.boreClearance || 0, helixAngle: -h }, base));
    const planet0 = buildGear(Object.assign({ teeth: sol.P, bore: p.planetBore || 0, boreClearance: p.boreClearance || 0, helixAngle: h }, base));
    const ring = buildRing(Object.assign({ teeth: sol.R, rim: p.rim, helixAngle: h }, base));
    return { sun, planet: planet0, ring, sol };
  }

  // Assemble the gearbox. The RING IS STATIONARY. sunAngle (rad) drives the sun;
  // the carrier (planet orbit) and planet spin follow real epicyclic kinematics so
  // the gears move *inside* the fixed ring while staying meshed.
  function assemblePlanetary(parts, p) {
    const S = parts.sol.S, P = parts.sol.P, R = parts.sol.R, N = parts.sol.N, m = p.module;
    const rc = m * (S + P) / 2;
    const ts = p.sunAngle || 0;                                 // sun angle (rad)
    const aS = ts / TAU;                                        // sun angle (turns)
    const carrier = ts * S / (S + R);                          // planet-orbit angle (rad)
    const spinRate = S * (P - R) / (P * (S + R));               // planet turns per sun turn
    const PP = (p.planetPhase || 0), RP = (p.ringPhase || 0);
    const out = [];
    const sun = clone(parts.sun); rotZ(sun, ts); out.push(sun);
    for (let k = 0; k < N; k++) {
      const phi = k * TAU / N + carrier;                        // orbital position
      const b0 = (0.5 + 0.5 * P + (P - S) * (k / N)) / P;       // static mesh clocking (turns)
      const beta = (b0 + aS * spinRate) * TAU + PP;             // absolute body rotation
      const pl = clone(parts.planet); rotZ(pl, beta);
      translate(pl, rc * Math.cos(phi), rc * Math.sin(phi), 0); out.push(pl);
    }
    // ring clocked ONCE (static) and kept fixed for all sun angles
    const g0 = (1 + 0.5 * P) / R;                               // turns
    const ring = clone(parts.ring); rotZ(ring, g0 * TAU + RP); out.push(ring);
    return merge.apply(null, out);
  }

  // ---- primitives for cycloidal drive ----
  function circlePts(r, n) { const a = []; for (let i = 0; i < n; i++) { const t = TAU * i / n; a.push([r * Math.cos(t), r * Math.sin(t)]); } return a; }
  function cylinder(r, z0, z1, segs) {
    const m = M(), bot = [], top = [];
    for (let i = 0; i < segs; i++) { const a = TAU * i / segs; bot.push(V(m, r * Math.cos(a), r * Math.sin(a), z0)); top.push(V(m, r * Math.cos(a), r * Math.sin(a), z1)); }
    for (let i = 0; i < segs; i++) { const j = (i + 1) % segs; Q(m, bot[i], bot[j], top[j], top[i]); }
    const cB = V(m, 0, 0, z0), cT = V(m, 0, 0, z1);
    for (let i = 0; i < segs; i++) { const j = (i + 1) % segs; T(m, cB, bot[j], bot[i]); T(m, cT, top[i], top[j]); }
    return m;
  }
  function tube(rOut, rIn, face, n) { return extrudeBetween(circlePts(rOut, n), circlePts(rIn, n), { face }); }

  // cycloidal disc profile — exact match to the user's MATLAB (single-argument atan)
  //   psi = atan( sin((N-1)t) / ( cos((N-1)t) - R/(N*e) ) )
  //   x =  R cos t - r cos(t+psi) - e cos(N t)
  //   y = -R sin t + r sin(t+psi) + e sin(N t)
  function cycloidProfile(p) {
    const R = p.R, r = p.r, N = p.N, e = p.e, steps = p.steps || 720, pts = [];
    for (let i = 0; i < steps; i++) {
      const t = TAU * i / steps;
      const psi = Math.atan(Math.sin((N - 1) * t) / (Math.cos((N - 1) * t) - R / (N * e)));
      const x = R * Math.cos(t) - r * Math.cos(t + psi) - e * Math.cos(N * t);
      const y = -R * Math.sin(t) + r * Math.sin(t + psi) + e * Math.sin(N * t);
      pts.push([x, y]);
    }
    return pts;
  }
  function shrinkRadial(pts, d) { return pts.map(([x, y]) => { const r = Math.hypot(x, y) || 1, k = (r - d) / r; return [x * k, y * k]; }); }

  // ===== validity: a disc is acceptable only if its boundary is a simple,
  //       star-shaped curve (polar angle strictly monotonic). Undercut /
  //       self-intersection (pin radius or eccentricity too large) -> invalid,
  //       mirroring SolidWorks' "invalid geometry" rejection. =====
  function segInt(p1, p2, p3, p4) {

      let ny = (b[2] - a[2]) * (c[0] - a[0]) - (b[0] - a[0]) * (c[2] - a[2]);
      let nz = (b[0] - a[0]) * (c[1] - a[1]) - (b[1] - a[1]) * (c[0] - a[0]);
      let ln = Math.hypot(nx, ny, nz);
      if (ln < 1e-9) continue;                          // skip zero-area (sliver) triangles
      let rx = b[0] - a[0], ry = b[1] - a[1], rz = b[2] - a[2]; let rl = Math.hypot(rx, ry, rz);
      nx /= ln; ny /= ln; nz /= ln; rx /= rl; ry /= rl; rz /= rl;
      const loop = E(`POLY_LOOP('',(#${pid[f[0]]},#${pid[f[1]]},#${pid[f[2]]}))`);
      const bound = E(`FACE_OUTER_BOUND('',#${loop},.T.)`);
      const dN = E(`DIRECTION('',(${N(nx)},${N(ny)},${N(nz)}))`);
      const dR = E(`DIRECTION('',(${N(rx)},${N(ry)},${N(rz)}))`);
      const ax = E(`AXIS2_PLACEMENT_3D('',#${pid[f[0]]},#${dN},#${dR})`);
      const pl = E(`PLANE('',#${ax})`);
      faceIds.push(E(`ADVANCED_FACE('',(#${bound}),#${pl},.T.)`));
    }
    const shell = E(`CLOSED_SHELL('',(${faceIds.map(i => '#' + i).join(',')}))`);
    const brep = E(`MANIFOLD_SOLID_BREP('${name}',#${shell})`);
    const dz = E(`DIRECTION('',(0.,0.,1.))`), dx = E(`DIRECTION('',(1.,0.,0.))`), org = E(`CARTESIAN_POINT('',(0.,0.,0.))`);
    const ax0 = E(`AXIS2_PLACEMENT_3D('',#${org},#${dz},#${dx})`);
    const lu = E(`(LENGTH_UNIT()NAMED_UNIT(*)SI_UNIT(.MILLI.,.METRE.))`);
    const au = E(`(NAMED_UNIT(*)PLANE_ANGLE_UNIT()SI_UNIT($,.RADIAN.))`);
    const su = E(`(NAMED_UNIT(*)SI_UNIT($,.STERADIAN.)SOLID_ANGLE_UNIT())`);
    const unc = E(`UNCERTAINTY_MEASURE_WITH_UNIT(LENGTH_MEASURE(1.E-05),#${lu},'distance_accuracy_value','')`);
    const ctx = E(`(GEOMETRIC_REPRESENTATION_CONTEXT(3)GLOBAL_UNCERTAINTY_ASSIGNED_CONTEXT((#${unc}))GLOBAL_UNIT_ASSIGNED_CONTEXT((#${lu},#${au},#${su}))REPRESENTATION_CONTEXT('',''))`);
    const absr = E(`ADVANCED_BREP_SHAPE_REPRESENTATION('',(#${brep},#${ax0}),#${ctx})`);
    const appctx = E(`APPLICATION_CONTEXT('automotive design')`);
    E(`APPLICATION_PROTOCOL_DEFINITION('international standard','automotive_design',2000,#${appctx})`);
    const pctx = E(`PRODUCT_CONTEXT('',#${appctx},'mechanical')`);
    const prod = E(`PRODUCT('${name}','${name}','',(#${pctx}))`);
    const pdf = E(`PRODUCT_DEFINITION_FORMATION('','',#${prod})`);
    const pdctx = E(`PRODUCT_DEFINITION_CONTEXT('part definition',#${appctx},'design')`);
    const pd = E(`PRODUCT_DEFINITION('design','',#${pdf},#${pdctx})`);
    const pds = E(`PRODUCT_DEFINITION_SHAPE('','',#${pd})`);
    E(`SHAPE_DEFINITION_REPRESENTATION(#${pds},#${absr})`);
    const header = `ISO-10303-21;\nHEADER;\nFILE_DESCRIPTION(('PartForge solid'),'2;1');\n` +
      `FILE_NAME('${name}.step','${new Date().toISOString()}',(''),(''),'PartForge','PartForge','');\n` +
      `FILE_SCHEMA(('AUTOMOTIVE_DESIGN { 1 0 10303 214 1 1 1 1 }'));\nENDSEC;\nDATA;\n`;
    return header + out.join('\n') + '\nENDSEC;\nEND-ISO-10303-21;\n';
  }

  function toSTL(mesh, name) {
    const Vt = mesh.verts, F = mesh.faces; let s = 'solid ' + (name || 'part') + '\n';
    for (const f of F) {
      const a = Vt[f[0]], b = Vt[f[1]], c = Vt[f[2]];
      let nx = (b[1] - a[1]) * (c[2] - a[2]) - (b[2] - a[2]) * (c[1] - a[1]);
      let ny = (b[2] - a[2]) * (c[0] - a[0]) - (b[0] - a[0]) * (c[2] - a[2]);
      let nz = (b[0] - a[0]) * (c[1] - a[1]) - (b[1] - a[1]) * (c[0] - a[0]);
      const L = Math.hypot(nx, ny, nz) || 1; nx /= L; ny /= L; nz /= L;
      s += `facet normal ${nx} ${ny} ${nz}\n outer loop\n  vertex ${a[0]} ${a[1]} ${a[2]}\n  vertex ${b[0]} ${b[1]} ${b[2]}\n  vertex ${c[0]} ${c[1]} ${c[2]}\n endloop\nendfacet\n`;
    }
    return s + 'endsolid ' + (name || 'part') + '\n';
  }

  const API = { buildGear, buildRing, buildPlanetary, assemblePlanetary, solvePlanetary,
    solvePlanetaryAuto,
    buildCycloidalDisc, cycloidProfile, cycDiscProfile, cycValidity, cycMaxPinR, cycEccRange, cycHoleRanges, toSTL, toSTEP, merge, translate, rotZ,
    _gearProfile: gearProfile, _twistFor: twistFor };
  root.PARTGEN = API;
})(typeof window !== 'undefined' ? window : globalThis);

</script>

<!-- ===== app ===== -->
<script>
(function(){
  const G=window.PARTGEN, cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const ICON={spur:'⚙',helical:'⛁',herringbone:'⛌'};
  const GTYPES=[{k:'spur',n:'Spur'},{k:'helical',n:'Helical'},{k:'herringbone',n:'Herringbone'}];
  const PTYPES=[{k:'spur',n:'Spur'},{k:'helical',n:'Helical'}];

  let mode='gear';
  const gear={kind:'spur',teeth:20,module:2,pressureAngle:20,face:10,bore:6,helixAngle:20};
  const plan={kind:'spur',target:5,planets:0,inputTorque:10,inputRpm:1000,module:2,maxOD:0,pressureAngle:20,face:10,helixAngle:15,sunBore:5,planetBore:4,part:'assembly',sol:null};
  const EFF=0.80;   // planetary efficiency (standard estimate)
  const cyc={ratio:19,D:80,d:8,e:1.5,face:10,bore:12,outCount:6,outCircleD:24,outHoleD:4,holesOK:true};
  let mesh=null,info=null,cycValid=true,cycInputs={};
  let planParts=null,sunAngle=0;   // cached planetary parts + animation state
  let planRefs={};                 // references to planetary inputs needing live hints / enable-disable

  const panel=document.getElementById('panel');
  function field(label,val,step,on){const r=document.createElement('div');r.className='row';
    const l=document.createElement('label');l.textContent=label;const i=document.createElement('input');
    i.type='number';i.step=step;i.value=val;i.oninput=()=>{const v=parseFloat(i.value);if(!isNaN(v))on(v);};
    r.appendChild(l);r.appendChild(i);return r;}
  // field with a live range hint underneath (for cycloidal constraints)
  function fieldR(key,label,val,step,on){const wrap=document.createElement('div');
    const r=document.createElement('div');r.className='row';
    const l=document.createElement('label');l.textContent=label;const i=document.createElement('input');
    i.type='number';i.step=step;i.value=val;i.oninput=()=>{const v=parseFloat(i.value);if(!isNaN(v)){on(v);}};
    r.appendChild(l);r.appendChild(i);
    const h=document.createElement('div');h.style.cssText='font-size:10.5px;color:var(--ink-soft);margin:-4px 0 6px;text-align:right';
    wrap.appendChild(r);wrap.appendChild(h);cycInputs[key]={input:i,hint:h};return wrap;}
  // field with a small live hint line underneath; returns {wrap,input,hint}
  function fieldH(label,val,step,on){const wrap=document.createElement('div');
    const r=document.createElement('div');r.className='row';
    const l=document.createElement('label');l.textContent=label;
    const i=document.createElement('input');i.type='number';i.step=step;i.value=val;
    i.oninput=()=>{const v=parseFloat(i.value);if(!isNaN(v))on(v);};
    r.appendChild(l);r.appendChild(i);
    const h=document.createElement('div');h.style.cssText='font-size:10.5px;color:var(--ink-soft);margin:-4px 0 6px;text-align:right';
    wrap.appendChild(r);wrap.appendChild(h);return {wrap,input:i,hint:h};}
  function typeRow(types,current,on){const wrap=document.createElement('div');wrap.className='types'+(types.length===2?' two':'');
    types.forEach(t=>{const b=document.createElement('button');b.className='type'+(t.k===current?' active':'');
      b.innerHTML='<b>'+ICON[t.k]+'</b>'+t.n;b.onclick=()=>on(t.k);wrap.appendChild(b);});return wrap;}
  function lab(txt){const d=document.createElement('div');d.className='label';d.textContent=txt;return d;}
  function seg(opts,current,on){const s=document.createElement('div');s.className='seg';
    opts.forEach(([k,n])=>{const b=document.createElement('button');b.textContent=n;if(current===k)b.classList.add('active');
      b.onclick=()=>on(k);s.appendChild(b);});return s;}

  function buildPanel(){
    panel.innerHTML='';cycInputs={};
    if(mode==='gear'){
      panel.appendChild(lab('Gear type'));
      panel.appendChild(typeRow(GTYPES,gear.kind,k=>{gear.kind=k;buildPanel();regen();}));
      panel.appendChild(lab('Parameters'));
      panel.appendChild(field('Teeth',gear.teeth,1,v=>{gear.teeth=Math.max(6,Math.round(v));regen();}));
      panel.appendChild(field('Module (mm)',gear.module,0.1,v=>{gear.module=v;regen();}));
      panel.appendChild(field('Pressure angle°',gear.pressureAngle,0.5,v=>{gear.pressureAngle=v;regen();}));
      panel.appendChild(field('Face width (mm)',gear.face,0.5,v=>{gear.face=v;regen();}));
      panel.appendChild(field('Bore Ø (mm)',gear.bore,0.5,v=>{gear.bore=v;regen();}));
      if(gear.kind!=='spur')panel.appendChild(field('Helix angle°',gear.helixAngle,1,v=>{gear.helixAngle=v;regen();}));
      panel.appendChild(infoEl());
    } else if(mode==='planetary'){
      panel.appendChild(lab('Gear type'));
      panel.appendChild(typeRow(PTYPES,plan.kind,k=>{plan.kind=k;buildPanel();regen();}));
      panel.appendChild(lab('Design target'));
      panel.appendChild(field('Gear ratio (i)',plan.target,0.5,v=>{plan.target=v;solveAndRegen();}));
      const pl=fieldH('Planets (0 = auto)',plan.planets,1,v=>{plan.planets=Math.max(0,Math.round(v));solveAndRegen();});
      const od=fieldH('Max outer Ø (0 = off)',plan.maxOD,1,v=>{plan.maxOD=Math.max(0,v);regen();});
      panel.appendChild(pl.wrap); panel.appendChild(od.wrap);
      panel.appendChild(field('Input torque (kg·cm)',plan.inputTorque,1,v=>{plan.inputTorque=Math.max(0,v);showInfo();draw();}));
      panel.appendChild(field('Input speed (rpm)',plan.inputRpm,10,v=>{plan.inputRpm=Math.max(0,v);showInfo();draw();}));
      panel.appendChild(lab('Geometry'));
      const md=fieldH('Module (mm)',plan.module,0.1,v=>{plan.module=v;regen();});
      panel.appendChild(md.wrap);
      planRefs={planets:pl,od:od,mod:md};
      panel.appendChild(field('Pressure angle°',plan.pressureAngle,0.5,v=>{plan.pressureAngle=v;regen();}));
      panel.appendChild(field('Face width (mm)',plan.face,0.5,v=>{plan.face=v;regen();}));
      panel.appendChild(field('Sun bore Ø',plan.sunBore,0.5,v=>{plan.sunBore=v;regen();}));
      panel.appendChild(field('Planet bore Ø',plan.planetBore,0.5,v=>{plan.planetBore=v;regen();}));
      if(plan.kind!=='spur')panel.appendChild(field('Helix angle°',plan.helixAngle,1,v=>{plan.helixAngle=v;regen();}));
      panel.appendChild(infoEl());
      panel.appendChild(lab('Export part'));
      panel.appendChild(seg([['assembly','Assembly'],['sun','Sun'],['planet','Planet'],['ring','Ring']],plan.part,
        k=>{plan.part=k;buildPanel();regen();resetView();}));
    } else {
      panel.appendChild(lab('Design'));
      panel.appendChild(fieldR('ratio','Reduction ratio (i)',cyc.ratio,1,v=>{cyc.ratio=Math.max(3,Math.round(v));regen();}));
      panel.appendChild(fieldR('D','Pin-circle Ø  D',cyc.D,1,v=>{cyc.D=v;regen();}));
      panel.appendChild(fieldR('d','Pin Ø  d',cyc.d,0.5,v=>{cyc.d=v;regen();}));
      panel.appendChild(fieldR('e','Eccentricity  e',cyc.e,0.25,v=>{cyc.e=v;regen();}));
      panel.appendChild(field('Face width (mm)',cyc.face,0.5,v=>{cyc.face=v;regen();}));
      panel.appendChild(field('Centre bore Ø',cyc.bore,0.5,v=>{cyc.bore=v;regen();}));
      panel.appendChild(lab('Output pins'));
      panel.appendChild(fieldR('outCount','Number of pins',cyc.outCount,1,v=>{cyc.outCount=Math.max(0,Math.round(v));regen();}));
      panel.appendChild(fieldR('outCircleD','Output pin-circle Ø',cyc.outCircleD,1,v=>{cyc.outCircleD=v;regen();}));
      panel.appendChild(fieldR('outHoleD','Output pin Ø',cyc.outHoleD,0.5,v=>{cyc.outHoleD=v;regen();}));
      panel.appendChild(infoEl());
    }
  }
  function infoEl(){const d=document.createElement('div');d.className='info';d.id='inf';return d;}

  function planParams(cl,quality){return {module:plan.module,solution:plan.sol,face:plan.face,kind:plan.kind,
    helixAngle:plan.helixAngle,pressureAngle:plan.pressureAngle,sunBore:plan.sunBore,planetBore:plan.planetBore,
    ptsPerFlank:quality,diaClearance:cl.dia,boreClearance:cl.bore};}

  function makeMesh(cl,quality){
    if(mode==='gear'){
      return G.buildGear({kind:gear.kind,teeth:gear.teeth,module:gear.module,pressureAngle:gear.pressureAngle,
        face:gear.face,bore:gear.bore,helixAngle:gear.helixAngle,ptsPerFlank:quality,diaClearance:cl.dia,boreClearance:cl.bore});
    } else if(mode==='planetary'){
      if(!plan.sol)plan.sol=solvePlan();
      const mm=effMod();
      const asm=plan.part==='assembly';
      const dia=asm?Math.max(cl.dia,0.08*mm):cl.dia;   // small backlash so assembled teeth mesh snugly without overlap
      const parts=G.buildPlanetary({module:mm,solution:plan.sol,face:plan.face,kind:plan.kind,
        helixAngle:plan.helixAngle,pressureAngle:plan.pressureAngle,sunBore:plan.sunBore,planetBore:plan.planetBore,
        ptsPerFlank:quality,diaClearance:dia,boreClearance:cl.bore});
      if(plan.part==='sun')return parts.sun;if(plan.part==='planet')return parts.planet;if(plan.part==='ring')return parts.ring;
      planParts=parts;
      return G.assemblePlanetary(parts,{module:mm,solution:plan.sol,sunAngle});
    } else {
      const R=cyc.D/2,r=cyc.d/2,N=cyc.ratio+1;
      const base={R,r,N,e:cyc.e,face:cyc.face,bore:cyc.bore,diaClearance:cl.dia,boreClearance:cl.bore,steps:quality>10?540:300};
      if(cyc.holesOK&&cyc.outCount>0){base.outCount=cyc.outCount;base.outCircleDia=cyc.outCircleD;base.outHoleDia=cyc.outHoleD;}
      return G.buildCycloidalDisc(base);
    }
  }
  function solvePlan(){return (plan.planets>=2?G.solvePlanetary(plan.target,plan.planets):null)||G.solvePlanetaryAuto(plan.target);}
  // effective module: if a max outer Ø is set, auto-size the module so the gearbox fits (overall Ø = module*(R+6.5))
  function effMod(){return (plan.maxOD>0&&plan.sol)?(plan.maxOD/(plan.sol.R+6.5)):plan.module;}
  function solveAndRegen(){plan.sol=solvePlan();regen();}

  function clearStage(){const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
    const bg=ctx.createRadialGradient(cx,cy*0.8,10,cx,cy,Math.max(W,H)*0.75);
    bg.addColorStop(0,'#f3e9dd');bg.addColorStop(1,'#e0cdb8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);}

  function regen(){
    if(mode==='cycloidal'){updateCyc();
      if(!cycValid){mesh=null;clearStage();return;}
      mesh=makeMesh({dia:0,bore:0},8);info=mesh.info;prepMesh(mesh);draw();return;}
    const q=(mode==='planetary'&&plan.part==='assembly')?6:8;
    mesh=makeMesh({dia:0,bore:0},q);info=mesh.info;prepMesh(mesh);showInfo();draw();
  }

  function hint(key,txt,bad){const o=cycInputs[key];if(!o)return;o.hint.textContent=txt;
    o.input.style.borderColor=bad?'#b5532f':'var(--line)';o.input.style.color=bad?'#b5532f':'var(--ink)';}

  function updateCyc(){
    const R=cyc.D/2,r=cyc.d/2,N=cyc.ratio+1;
    const v=G.cycValidity({R,r,N,e:cyc.e});
    cycValid=v.ok;
    // ranges for profile params
    const pinDmax=2*G.cycMaxPinR({R,N,e:cyc.e});
    const ecc=G.cycEccRange({R,r,N});
    hint('ratio','pins = '+N+' · lobes = '+cyc.ratio,false);
    hint('D','disc Ø ≈ '+(v.rmax?(2*v.rmax).toFixed(1):'—')+' mm',!(cyc.D>0));
    hint('d','valid ≤ '+pinDmax.toFixed(2)+' mm',cyc.d>pinDmax+1e-6);
    hint('e',ecc.emin!=null?('valid '+ecc.emin.toFixed(2)+'–'+ecc.emax.toFixed(2)+' mm'):'no valid range',!(cyc.e>=(ecc.emin||0)&&cyc.e<=(ecc.emax||0)));
    // output pin ranges (only if profile valid)
    let holesOK=true;
    if(cyc.outCount>0){
      const hr=G.cycHoleRanges({R,r,N,e:cyc.e,bore:cyc.bore,outCount:cyc.outCount,outHoleDia:cyc.outHoleD,outCircleDia:cyc.outCircleD});
      const cOK=cyc.outCircleD>=hr.circleMin&&cyc.outCircleD<=hr.circleMax;
      const hOK=cyc.outHoleD<=hr.holeMax&&cyc.outHoleD>0;
      const nOK=cyc.outCount<=hr.countMax;
      hint('outCount','max '+hr.countMax,!nOK);
      hint('outCircleD','valid '+hr.circleMin+'–'+hr.circleMax+' mm',!cOK);
      hint('outHoleD','valid ≤ '+hr.holeMax+' mm',!hOK);
      holesOK=cOK&&hOK&&nOK&&v.ok;
    } else { hint('outCount','0 = none',false);hint('outCircleD','—',false);hint('outHoleD','—',false); }
    cyc.holesOK=holesOK;
    // banner
    const el=document.getElementById('inf');if(el){
      if(!v.ok){el.style.background='rgba(181,83,47,.12)';el.style.borderColor='#b5532f';el.style.color='#8f3d22';
        el.innerHTML='<b>✗ Invalid geometry</b><br>'+v.reason;}
      else{el.style.background='';el.style.borderColor='';el.style.color='';
        const rows=[{h:cyc.ratio+' : 1   ✓ valid'},
          ['Pins',N],['Lobes',cyc.ratio],['Eccentricity',cyc.e+' mm'],
          ['Disc Ø',(2*v.rmax).toFixed(1)+' mm'],['Pin-circle Ø',cyc.D+' mm'],['Pin Ø',cyc.d+' mm'],
          ['Centre bore Ø',cyc.bore+' mm'],
          ['Output pins',(cyc.outCount>0&&holesOK)?(cyc.outCount+' × Ø'+cyc.outHoleD+' on Ø'+cyc.outCircleD):(cyc.outCount>0?'out of range ⚠':'none')],
          ['Face width',cyc.face+' mm']];
        el.innerHTML=specs(rows);}
    }
  }

  function specs(rows){return '<div class="specs">'+rows.map(r=>r.h!==undefined
    ?('<div class="hd">'+r.h+'</div>')
    :('<span class="k">'+r[0]+'</span><span class="v">'+r[1]+'</span>')).join('')+'</div>';}
  function showInfo(){const el=document.getElementById('inf');if(!el)return;
    if(mode==='gear'){
      const rootDia=+((gear.teeth-2*1.25)*gear.module).toFixed(2);
      const rows=[{h:cap(info.type)},
        ['Teeth',info.teeth],['Module',info.module+' mm'],['Pressure angle',gear.pressureAngle+'°'],
        ['Pitch Ø',info.pitchDia+' mm'],['Outer Ø',info.outerDia+' mm'],['Root Ø',rootDia+' mm'],
        ['Bore Ø',info.bore+' mm'],['Face width',gear.face+' mm']];
      if(gear.kind!=='spur')rows.push(['Helix angle',gear.helixAngle+'°']);
      el.innerHTML=specs(rows);
    } else if(mode==='planetary'){const s=plan.sol;
      const mm=effMod(), cd=mm*(s.S+s.P)/2, overall=mm*(s.R+6.5);
      // live hints + lock the module field when it is auto-driven by Max outer Ø
      if(planRefs.planets)planRefs.planets.hint.textContent=plan.planets>=2?'fixed count':('auto → '+s.N+' planets');
      if(planRefs.od)planRefs.od.hint.textContent=plan.maxOD>0?('auto-sets module → '+mm.toFixed(3)+' mm'):'auto-sets the module to fit';
      if(planRefs.mod){const dis=plan.maxOD>0,inp=planRefs.mod.input;
        inp.disabled=dis;inp.style.opacity=dis?0.5:1;inp.value=dis?mm.toFixed(3):plan.module;
        planRefs.mod.hint.textContent=dis?'auto-fit (Max outer Ø set)':'';}
      const reached=s.err<0.01;
      const outTorque=(plan.inputTorque*s.ratio*EFF/100);     // kg·cm in -> kg·m out (÷100)
      const outRpm=plan.inputRpm/s.ratio;
      const head=reached?(s.ratio+' : 1  (exact)'):(s.ratio+' : 1  ⚠ max — target '+plan.target+' needs 2 stages');
      const rows=[{h:head},
        ['Planets',s.N+(plan.planets>=2?'':'  (auto)')],['Sun teeth',s.S],['Planet teeth',s.P],['Ring teeth',s.R],
        ['Module',(plan.maxOD>0?mm.toFixed(3)+' mm (fit)':mm+' mm')],['Centre distance',cd.toFixed(2)+' mm'],
        ['Overall Ø ≈',overall.toFixed(1)+' mm'+(plan.maxOD>0?' (≤ limit)':'')],['Face width',plan.face+' mm'],
        {h:'Drive (η ~'+(EFF*100)+'%)'},
        ['Input torque',plan.inputTorque+' kg·cm'],
        ['Output torque',outTorque.toFixed(3)+' kg·m'],
        ['Input speed',plan.inputRpm+' rpm'],
        ['Output speed',outRpm.toFixed(1)+' rpm']];
      if(plan.kind!=='spur')rows.push(['Helix angle',plan.helixAngle+'° (sun opp.)']);
      rows.push(['Exporting',cap(plan.part)]);
      el.innerHTML=specs(rows);
    }}
  function cap(s){return s.replace(/^./,c=>c.toUpperCase());}

  // renderer
  let rotX=-1.0,rotY=0.55,scale=1,center=[0,0,0],spin=false,raf=null,drag=false,lx=0,ly=0;
  function prepMesh(m){const Vv=m.verts;let a=[1e9,1e9,1e9],b=[-1e9,-1e9,-1e9];
    for(const v of Vv)for(let i=0;i<3;i++){if(v[i]<a[i])a[i]=v[i];if(v[i]>b[i])b[i]=v[i];}
    center=[(a[0]+b[0])/2,(a[1]+b[1])/2,(a[2]+b[2])/2];
    const rad=0.5*Math.hypot(b[0]-a[0],b[1]-a[1],b[2]-a[2])||1;scale=1/rad;}
  function resize(){const r=cv.getBoundingClientRect(),dpr=Math.min(2,window.devicePixelRatio||1);
    cv.width=Math.max(1,r.width*dpr);cv.height=Math.max(1,r.height*dpr);draw();}
  window.addEventListener('resize',resize);
  function draw(){
    if(!mesh){clearStage();return;}const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
    const bg=ctx.createRadialGradient(cx,cy*0.8,10,cx,cy,Math.max(W,H)*0.75);
    bg.addColorStop(0,'#f3e9dd');bg.addColorStop(1,'#e0cdb8');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const cX=Math.cos(rotX),sX=Math.sin(rotX),cY=Math.cos(rotY),sY=Math.sin(rotY);
    const Vv=mesh.verts,F=mesh.faces,n=Vv.length,px=new Float64Array(n),py=new Float64Array(n),pz=new Float64Array(n);
    for(let i=0;i<n;i++){let x=(Vv[i][0]-center[0])*scale,y=(Vv[i][1]-center[1])*scale,z=(Vv[i][2]-center[2])*scale;
      let x1=x*cY+z*sY,z1=-x*sY+z*cY,y2=y*cX-z1*sX,z2=y*sX+z1*cX;px[i]=x1;py[i]=y2;pz[i]=z2;}
    const light=[-0.35,-0.5,0.78],fit=Math.min(W,H)*0.40,tris=[];
    for(let f=0;f<F.length;f++){const a=F[f][0],b=F[f][1],c=F[f][2];
      let nx=(py[b]-py[a])*(pz[c]-pz[a])-(pz[b]-pz[a])*(py[c]-py[a]);
      let ny=(pz[b]-pz[a])*(px[c]-px[a])-(px[b]-px[a])*(pz[c]-pz[a]);
      let nz=(px[b]-px[a])*(py[c]-py[a])-(py[b]-py[a])*(px[c]-px[a]);
      if(nz<0)continue;                                  // back-face cull (meshes are closed & outward-oriented)
      const nl=Math.hypot(nx,ny,nz)||1;let br=0.30+0.78*Math.abs((nx*light[0]+ny*light[1]+nz*light[2])/nl);
      if(br>1)br=1;tris.push([(pz[a]+pz[b]+pz[c])/3,a,b,c,br]);}
    tris.sort((p,q)=>p[0]-q[0]);
    const base=[168,118,72],doStroke=F.length<4500&&!drag;
    for(const t of tris){const a=t[1],b=t[2],c=t[3],br=t[4];
      ctx.beginPath();ctx.moveTo(cx+px[a]*fit,cy-py[a]*fit);ctx.lineTo(cx+px[b]*fit,cy-py[b]*fit);ctx.lineTo(cx+px[c]*fit,cy-py[c]*fit);ctx.closePath();
      const r=base[0]*br|0,g=base[1]*br|0,bl=base[2]*br|0;ctx.fillStyle='rgb('+r+','+g+','+bl+')';
      if(doStroke){ctx.strokeStyle=ctx.fillStyle;ctx.lineWidth=0.6;ctx.stroke();}ctx.fill();}
    if(mode==='planetary'&&plan.sol){
      const s=plan.sol, outT=(plan.inputTorque*s.ratio*EFF/100).toFixed(3), outRpm=(plan.inputRpm/s.ratio).toFixed(0), fs=Math.round(Math.min(W,H)*0.034);
      ctx.fillStyle='#7f5539';ctx.font='600 '+fs+'px Georgia,serif';ctx.textBaseline='top';
      ctx.fillText(s.ratio+' : 1   ·   τ out ≈ '+outT+' kg·m', fs*0.6, fs*0.6);
      ctx.fillStyle='rgba(107,86,69,0.85)';ctx.font=Math.round(fs*0.62)+'px Georgia,serif';
      ctx.fillText(outRpm+' rpm out  ·  '+s.N+' planets  ·  ring fixed  ·  η '+(EFF*100)+'%', fs*0.6, fs*0.6+fs*1.2);
    }
  }
  cv.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;cv.setPointerCapture(e.pointerId);});
  cv.addEventListener('pointermove',e=>{if(!drag)return;rotY+=(e.clientX-lx)*0.01;rotX+=(e.clientY-ly)*0.01;
    rotX=Math.max(-Math.PI/2+0.05,Math.min(Math.PI/2-0.05,rotX));lx=e.clientX;ly=e.clientY;draw();});
  cv.addEventListener('pointerup',()=>{drag=false;draw();});
  cv.addEventListener('wheel',e=>{e.preventDefault();scale*=Math.exp(-e.deltaY*0.0011);draw();},{passive:false});
  function resetView(){const top=(mode==='cycloidal')||(mode==='planetary'&&plan.part==='assembly');
    rotX=top?-0.4:-1.0;rotY=0.55;if(mesh)prepMesh(mesh);draw();}
  document.getElementById('reset').onclick=resetView;
  document.getElementById('spin').onclick=function(){spin=!spin;this.style.background=spin?'var(--olive)':'transparent';
    this.style.color=spin?'#f4efe2':'';loop();};
  function loop(){
    if(!spin){if(raf)cancelAnimationFrame(raf);return;}
    if(mode==='planetary'&&plan.part==='assembly'&&planParts){
      sunAngle-=0.045;                                   // drive the sun; ring fixed, planets follow
      mesh=G.assemblePlanetary(planParts,{module:plan.module,solution:plan.sol,sunAngle});
      draw();
    } else { rotY+=0.012; draw(); }                       // other views: orbit the camera
    raf=requestAnimationFrame(loop);
  }

  // downloads
  function tol(){return {bore:parseFloat(document.getElementById('tolBore').value)||0,dia:parseFloat(document.getElementById('tolDia').value)||0};}
  function fname(printed,ext){let base;
    if(mode==='gear')base=gear.kind+'_z'+gear.teeth+'_m'+gear.module;
    else if(mode==='planetary')base='planetary_'+plan.sol.ratio.toFixed(2).replace('.','p')+'to1_'+plan.part;
    else base='cycloidal_'+cyc.ratio+'to1_disc';
    return 'partforge_'+base+(printed?'_print':'')+'.'+ext;}
  function download(printed){
    if(mode==='cycloidal'&&!cycValid){alert('Invalid geometry — adjust the parameters (see the red ranges) before exporting.');return;}
    const fmt=document.getElementById('fmt').value;
    const cl=printed?tol():{dia:0,bore:0};const m=makeMesh(cl,14);
    const data=fmt==='step'?G.toSTEP(m,mode):G.toSTL(m,mode);
    const blob=new Blob([data],{type:fmt==='step'?'application/step':'model/stl'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=fname(printed,fmt).replace(/\s+/g,'');a.click();setTimeout(()=>URL.revokeObjectURL(url),1500);}
  document.getElementById('dlStl').onclick=()=>download(false);
  document.getElementById('dlPrint').onclick=()=>download(true);

  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
    mode=t.dataset.mode;
    if(mode==='planetary'&&!plan.sol)plan.sol=solvePlan();
    buildPanel();regen();resetView();});

  buildPanel();
  requestAnimationFrame(()=>{resize();regen();resetView();});
})();

</script>
</body>
</html>
